name: Build Elite IPA

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Debug and Build
        run: |
          brew install xcodegen
          xcodegen generate
          echo "--- قائمة الملفات الموجودة حالياً ---"
          ls -F
          echo "--- الـ Schemes المتاحة ---"
          xcodebuild -list
          echo "--- محاولة البناء ---"
          xcodebuild -scheme EliteIPA -configuration Release build
